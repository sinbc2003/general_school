name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (import + permission validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import smoke test (모든 모델/라우터 import 검증)
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///ci_test.db"
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          ENCRYPTION_MASTER_KEY: ci-test-encryption-key-not-for-production
        run: |
          python -c "from app.main import app; print('App imported OK')"
      - name: Permission registry consistency
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///ci_test.db"
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          ENCRYPTION_MASTER_KEY: ci-test-encryption-key-not-for-production
        run: |
          python -c "
          import app.main  # 라우터 import → _REGISTERED_KEYS 채움
          from app.core.permission_registry import collect_defined_permissions, validate_permission_coverage
          defined = collect_defined_permissions()
          validate_permission_coverage(defined)
          print(f'Permission registry OK: {len(defined)} keys')
          "

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install
      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Next.js build (production)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8002
        run: npm run build
