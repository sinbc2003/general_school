# General School — nginx reverse proxy.
# 학교 LAN 안에서 http://노트북IP/ 로 접속하면 frontend·api·yjs 모두 통합됨.
# HTTPS는 학교 도메인 보유 + Let's Encrypt 또는 학교가 발급한 사설 인증서 사용 시 추가.
#
# 적용 후:
#   sudo nginx -t && sudo systemctl reload nginx

# 학생 파일 업로드 한도 (POLICY_ARTIFACT 100MB와 일치).
client_max_body_size 110M;

# 응답 gzip 압축 — 정적 자산·JSON·HTML 효과 큼.
gzip on;
gzip_types
    text/plain text/css text/javascript
    application/json application/javascript application/xml+rss
    image/svg+xml;
gzip_min_length 1024;
gzip_vary on;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 보안 헤더 (기본)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Frontend (Next.js) ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSR/RSC 무거운 페이지·HMR(개발 reload) 대비. backend timeout(300s)과 일치.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Backend API ──
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # PDF 생기부·CSV import 등 느린 endpoint 대비
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Yjs WebSocket (Hocuspocus) ──
    location /yjs {
        proxy_pass http://127.0.0.1:1234;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket 장시간 연결 유지 (24h)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Next.js 정적 자산 캐싱 (성능) ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        # immutable 자산 — 빌드 hash 이름이라 영구 캐시 OK
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
