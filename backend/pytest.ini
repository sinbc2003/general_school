[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: 느린 테스트 (E2E, 무거운 setup)
    security: 보안 critical 회귀 테스트 (절대 깨지면 안 됨)
    permissions: 권한 시스템 테스트
    auth: 인증 흐름 테스트
